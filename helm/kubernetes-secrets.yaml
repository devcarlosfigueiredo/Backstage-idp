###############################################################################
# Kubernetes Secrets para o Backstage
# Em produção: usar External Secrets Operator + AWS Secrets Manager
###############################################################################

---
# ExternalSecret — sincroniza secrets do AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-secrets
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: backstage-secrets
    creationPolicy: Owner

  data:
    # PostgreSQL
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: platform-portal/postgres
        property: host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: platform-portal/postgres
        property: port
    - secretKey: POSTGRES_USER
      remoteRef:
        key: platform-portal/postgres
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: platform-portal/postgres
        property: password

    # GitHub
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: platform-portal/github
        property: token
    - secretKey: AUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: platform-portal/github-oauth
        property: client_id
    - secretKey: AUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: platform-portal/github-oauth
        property: client_secret

    # Prometheus / Grafana
    - secretKey: PROMETHEUS_URL
      remoteRef:
        key: platform-portal/monitoring
        property: prometheus_url
    - secretKey: GRAFANA_URL
      remoteRef:
        key: platform-portal/monitoring
        property: grafana_url
    - secretKey: GRAFANA_TOKEN
      remoteRef:
        key: platform-portal/monitoring
        property: grafana_token

    # Kubernetes
    - secretKey: K8S_SERVICE_ACCOUNT_TOKEN
      remoteRef:
        key: platform-portal/kubernetes
        property: service_account_token

    # Redis
    - secretKey: REDIS_HOST
      remoteRef:
        key: platform-portal/redis
        property: host
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: platform-portal/redis
        property: password

---
# ClusterSecretStore — configura o acesso ao AWS Secrets Manager via IRSA
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: backstage
            namespace: backstage

---
# Namespace dedicado para o Backstage
apiVersion: v1
kind: Namespace
metadata:
  name: backstage
  labels:
    app.kubernetes.io/name: backstage
    team: platform-engineering

---
# ServiceAccount com anotação IRSA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/platform-portal-backstage-irsa"

---
# RBAC — permite ao Backstage listar recursos Kubernetes
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-kubernetes-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - namespaces
      - nodes
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources: [pods, nodes]
    verbs: [get, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-kubernetes-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-kubernetes-reader
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage
